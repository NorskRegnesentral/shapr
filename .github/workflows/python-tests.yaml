# GitHub Actions workflow for Python testing
# Tests the pyshapr package (requires R backend for shapr package)

name: Python Tests

on:
  schedule:
    # Monthly maintenance check on the default branch, at 14:05 UTC on day 17.
    - cron: '5 14 17 * *'
  workflow_dispatch:
  push:
    branches: [main, master, cranversion, devel]
  pull_request:
    branches: [main, master, cranversion, devel]

jobs:
  test-python:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    name: Python ${{ matrix.python-version }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      TORCH_INSTALL: 1
      # Reproducibility settings
      PYTHONHASHSEED: 0
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Configure R shared library path for rpy2
        run: |
          echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(R RHOME)/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-release-shapr-${{ hashFiles('DESCRIPTION', 'NAMESPACE', 'R/**/*.R') }}
          restore-keys: |
            ${{ runner.os }}-r-release-shapr-

      - name: Cache Python packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('python/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'  # Install all dependencies, including Suggests
          extra-packages: any::remotes

      - name: Install R shapr package
        run: |
          if ("shapr" %in% rownames(installed.packages())) {
            remove.packages("shapr")
          }
          remotes::install_local(
            ".",
            dependencies = FALSE,
            build_vignettes = FALSE,
            force = TRUE,
            upgrade = "never"
          )
        shell: Rscript {0}

      - name: Install Python pyshapr package for testing
        run: |
          cd python
          uv sync --locked --extra test --python ${{ matrix.python-version }}
      - name: Verify installation
        run: |
          cd python
          uv run --locked python -c "
          import rpy2.robjects as ro
          ro.r('library(shapr)')
          print('✓ R shapr package loaded')
          import pyshapr
          print('✓ Python pyshapr package loaded')
          "

      - name: Run Python tests (excluding local-only tests)
        run: |
          cd python
          uv run --locked pytest tests/ -v --tb=short -m "not localonly"
