# GitHub Actions workflow for Python testing
# Tests the shaprpy package (requires R backend for shapr package)

name: Python Tests

on:
  push:
    branches: [main, master, cranversion, devel]
  pull_request:
    branches: [main, master, cranversion, devel]

jobs:
  test-python:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    name: Python ${{ matrix.python-version }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      TORCH_INSTALL: 1
      # Reproducibility settings
      PYTHONHASHSEED: 0
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-release-shapr-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-release-shapr-

      - name: Cache Python packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('python/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'  # Install all dependencies, including Suggests
          extra-packages: any::remotes

      - name: Install R shapr package
        run: |
          remotes::install_local(".", dependencies = FALSE, build_vignettes = FALSE)
        shell: Rscript {0}

      - name: Install Python shaprpy package for testing
        run: |
          cd python
          uv sync --locked --extra test --python ${{ matrix.python-version }}

      - name: Verify installation
        run: |
          cd python
          uv run --locked python -c "
          import rpy2.robjects as ro
          ro.r('library(shapr)')
          print('✓ R shapr package loaded')
          import shaprpy
          print('✓ Python shaprpy package loaded')
          "

      - name: Run Python tests (excluding local-only tests)
        run: |
          cd python
          uv run --locked pytest tests/ -v --tb=short -m "not localonly"
